# Bootstrap Squad from https://github.com/PavelK2254/squad (clone, build CLI, `squad init`).
# Matches upstream README: https://github.com/PavelK2254/squad — `squad init` scaffolds `.squad/`.
#
# Interactive “open squad and describe the project” (README quick start) is meant for
# `copilot --agent squad` (or a TTY session). Bare `squad` with no args launches the Ink shell,
# which requires a TTY and is deprecated upstream — it will not run in GitHub Actions. This
# workflow uses CI-safe CLI commands (`squad status`, `squad cast`) after init and again after
# preset + seed, and seeds the same README-style prompt text
# (Jira title / what you're building) via squad-seed-bootstrap.mjs.
#
# Jira-driven description (not a preset name): `building` + optional `issue_key` are written to
# `.squad/.init-prompt` and **Building:** / `identity/now.md` via squad-seed-bootstrap.mjs
# (README-style “what I'm building” text for coordinator casting).
#
# Agent pack: when `apply_preset` is true, we apply SDK preset `default` via a dedicated Node step
# (the CLI does not reliably await `applyPreset` after `runInit`, so `--preset` on `squad init` alone
# can leave only scribe/ralph). Ticket wording still only drives `.init-prompt` / **Building:**.
#
# Optional ref: `squad_git_ref` / `client_payload.squad_ref` (default `dev`).
#
# Local use (README quick start): Copilot / Squad agent —
#   I'm starting a new project. Set up the team.
#   Here's what I'm building: …
#
# Run once (or when refreshing scaffold); init is idempotent.
name: Squad Setup

on:
  repository_dispatch:
    types: [squad_setup]
  workflow_dispatch:
    inputs:
      squad_git_ref:
        description: "Git ref on PavelK2254/squad (branch or tag)"
        required: false
        default: dev
        type: string
      include_workflows:
        description: "Let squad init install its GitHub workflow templates (may add/change .github/workflows)"
        required: false
        default: false
        type: boolean
      building:
        description: "Jira issue summary / what you're building. Drives `.squad/.init-prompt` + **Building:** (not `--preset`)."
        required: false
        default: ""
        type: string
      issue_key:
        description: "Jira issue key (e.g. TDS-7). Optional; prefixed to **Building:** when combined with summary."
        required: false
        default: ""
        type: string
      apply_preset:
        description: "After init, apply SDK preset `default` (starter specialist agents). Ticket text uses `.init-prompt`, not this id."
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: squad-setup-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SQUAD_GIT_REF: ${{ github.event.client_payload.squad_ref || github.event.inputs.squad_git_ref || 'dev' }}
      BOOTSTRAP_BUILDING: ${{ github.event.client_payload.building || github.event.inputs.building || '' }}
      BOOTSTRAP_ISSUE_KEY: ${{ github.event.client_payload.issue_key || github.event.inputs.issue_key || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build and install Squad CLI from fork
        shell: bash
        run: |
          set -euo pipefail
          dest="${RUNNER_TEMP}/squad-fork"
          rm -rf "$dest"
          git clone --depth 1 --single-branch --branch "${SQUAD_GIT_REF}" \
            https://github.com/PavelK2254/squad.git "$dest"
          cd "$dest"
          npm ci
          npm run build
          npm install -g ./packages/squad-cli
          squad --version || true
          echo "SQUAD_FORK_ROOT=${dest}" >> "${GITHUB_ENV}"

      - name: Squad init (non-interactive)
        env:
          CI: "true"
          NO_COLOR: "1"
          INCLUDE_WORKFLOWS: ${{ github.event.client_payload.include_workflows || github.event.inputs.include_workflows || 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          APPLY_PRESET=true
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]] && [[ "${{ github.event.client_payload.apply_preset }}" == "false" ]]; then
            APPLY_PRESET=false
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] && [[ "${{ github.event.inputs.apply_preset }}" == "false" ]]; then
            APPLY_PRESET=false
          fi
          echo "APPLY_PRESET=${APPLY_PRESET}" >> "${GITHUB_ENV}"
          extra=()
          if [[ "${INCLUDE_WORKFLOWS}" != "true" ]]; then
            extra+=(--no-workflows)
          fi
          # Do not pass --preset here: the CLI chains applyPreset after runInit without awaiting,
          # so the process can exit before preset agents are installed. Apply preset in the next step.
          squad init "${extra[@]}"

      # Non-interactive CLI only: bare `squad` needs a TTY (see upstream shell + README).
      - name: Squad CLI — status after init (CI-safe)
        env:
          NO_COLOR: "1"
        shell: bash
        run: |
          set -euo pipefail
          squad status
          squad cast

      - name: Apply Squad preset (awaited)
        env:
          APPLY_PRESET: ${{ env.APPLY_PRESET }}
          SQUAD_FORK_ROOT: ${{ env.SQUAD_FORK_ROOT }}
          PRESET_NAME: default
        run: node .github/scripts/squad-apply-preset.mjs

      - name: List Squad agents (debug)
        shell: bash
        run: |
          set -euo pipefail
          ls -la .squad/agents || true

      - name: Seed new-project context (optional)
        env:
          # After preset apply, team.md may already list scribe/ralph — force full roster from disk.
          BOOTSTRAP_FORCE_MEMBERS_SYNC: ${{ env.APPLY_PRESET }}
        run: node .github/scripts/squad-seed-bootstrap.mjs

      - name: Squad CLI — status after preset + seed
        env:
          NO_COLOR: "1"
        shell: bash
        run: |
          set -euo pipefail
          squad status
          squad cast

      - name: Verify with squad doctor
        env:
          NO_COLOR: "1"
        run: squad doctor || true

      - name: Commit Squad scaffold when changed
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d .squad ]]; then git add -A .squad; fi
          if [[ -d .github/agents ]]; then git add -A .github/agents; fi
          if [[ -f squad.config.ts ]]; then git add squad.config.ts; fi
          if git diff --cached --quiet; then
            echo "No Squad scaffold changes to commit."
            exit 0
          fi
          git commit -m "chore(squad): bootstrap Squad workspace (run ${GITHUB_RUN_ID})"
          git push origin HEAD:main
          echo "Pushed Squad scaffold to main."
